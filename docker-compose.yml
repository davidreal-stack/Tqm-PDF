version: "3.9"

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuforge_api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://docuforge:secret@db:5432/docuforge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - STORAGE_BACKEND=local
      - SECRET_KEY=dev-secret-change-in-prod
      - JWT_SECRET=dev-jwt-change-in-prod
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    volumes:
      - ./backend:/app
      - docuforge_uploads:/tmp/docuforge/uploads
      - docuforge_outputs:/tmp/docuforge/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (Fase 2) ──────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuforge_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://docuforge:secret@db:5432/docuforge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
      - docuforge_uploads:/tmp/docuforge/uploads
      - docuforge_outputs:/tmp/docuforge/outputs
    depends_on:
      - api
      - redis
    restart: unless-stopped
    profiles: ["celery"]   # docker compose --profile celery up

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuforge_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["production"]

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: docuforge_db
    environment:
      POSTGRES_USER: docuforge
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: docuforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docuforge_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Flower (monitor Celery) ──────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: docuforge_flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles: ["celery"]

volumes:
  postgres_data:
  docuforge_uploads:
  docuforge_outputs: